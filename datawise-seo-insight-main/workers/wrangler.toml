name = "datawise-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "development"
FRONTEND_URL = "https://datawiseseo.com"
# Note: For production, change to your actual domain
# Set these via `wrangler secret put`:
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# ENCRYPTION_KEY
# DATAFORSEO_EMAIL
# DATAFORSEO_PASSWORD

[[d1_databases]]
binding = "DB"
database_name = "datawise-db"
